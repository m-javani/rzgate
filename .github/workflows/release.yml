name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Strip binary
        run: strip --strip-all target/x86_64-unknown-linux-gnu/release/rzgate

      - name: Install UPX
        run: sudo apt-get update && sudo apt-get install -y upx

      - name: Compress with UPX
        run: upx --best --lzma target/x86_64-unknown-linux-gnu/release/rzgate

      - name: Generate checksum
        run: |
          cd target/x86_64-unknown-linux-gnu/release
          sha256sum rzgate > rzgate.sha256

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            target/x86_64-unknown-linux-gnu/release/rzgate
            target/x86_64-unknown-linux-gnu/release/rzgate.sha256
          generate_release_notes: true
          name: ${{ github.ref_name }}